# 集思录 Cookie (必填)
# 从集思录网站登录后获取的 Cookie，用于访问可转债数据
# 获取方法：登录集思录 -> F12 开发者工具 -> 刷新页面 -> 复制请求头中的 Cookie
jsl_cookie: "your_jisilu_cookie_here"

# AI API 配置 (必填)
ai:
  # API Key
  api_key: "your_api_key_here"
  # API Base URL
  base_url: "https://api.example.com"
  # 模型名称
  model: "gpt-4"

# AI 决策风格提示词 (可选)
# 默认策略：三低优化策略 - 低价、低溢价、低余额
# 其他可选策略：
#   - "稳健防守策略 - 侧重高 AAA 评级、低价格转债"
#   - "激进进攻策略 - 侧重高弹性、小余额转债"
#   - "平衡配置策略 - 兼顾安全性和收益性"
ai_strategy_prompt: ""

# 数据过滤条件 (可选)
filter:
  # 最大剩余规模 (亿元)，超过此值的转债将被过滤
  max_remaining_size: 50
  # 最高转债价格 (元)，超过此值的转债将被过滤
  max_price: 150
  # 最高溢价率 (%)，超过此值的转债将被过滤
  max_premium_ratio: 50
  # 是否过滤 ST 正股
  exclude_st: true
  # 是否过滤已公告强赎的转债
  exclude_redeem: true
